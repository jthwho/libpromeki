# Mirror configuration for third-party submodules.
#
# Format:
#   VAR=value              Variable assignment (expanded via ${VAR} in URLs)
#   [section-name]         Named section (select with ./setup-mirrors.sh section-name ...)
#   upstream = mirror      URL rewrite rule (applied via git's insteadOf)
#
# Git uses longest-match for insteadOf rules, so a full-URL mirror will
# always take priority over a shorter prefix rewrite.  This means you can
# layer sections: enable "github-ssh" for a broad https->ssh rewrite AND
# "gitea" for specific repos — the gitea entries win where they exist,
# and github-ssh covers everything else.
#
# Examples:
#   ./scripts/setup-mirrors.sh github-ssh          # SSH for GitHub repos
#   ./scripts/setup-mirrors.sh hl                  # local howardlogic mirror only
#   ./scripts/setup-mirrors.sh                     # all sections

HL=ssh://git@git.howardlogic.com:9122


[github-ssh]
https://github.com/ = ssh://git@github.com/


[hl]
https://github.com/libjpeg-turbo/libjpeg-turbo.git = ${HL}/thirdparty/libjpeg-turbo.git
https://github.com/nlohmann/json.git                = ${HL}/thirdparty/nlohmann-json.git
https://github.com/libsndfile/libsndfile.git        = ${HL}/thirdparty/libsndfile.git
https://github.com/madler/zlib.git                   = ${HL}/thirdparty/zlib.git
https://github.com/glennrp/libpng.git               = ${HL}/thirdparty/libpng.git
https://gitlab.freedesktop.org/freetype/freetype.git = ${HL}/thirdparty/freetype.git
https://github.com/jthwho/libvtc.git                = ${HL}/jthwho/libvtc.git
